name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой из веб-интерфейса

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Разрешение на запись образа в GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Переводим имя репозитория в нижний регистр (octohare/trusttunnel)
      - name: Lowercase repository name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Имена тегов (GitHub автоматически приведёт имя в нижний регистр)
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
